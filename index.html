<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D VOXEL</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "d3": "https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js/+esm"
            }
        }
    </script>
    

    <script type="module">
        import { init } from './js/main.js';
        window.addEventListener('DOMContentLoaded', init);
    </script>

</head>

<body>

    

    
    <p class="upload-container">
        <label for="upload">Upload Voxel Data:</label>
        <input id="upload" type="file" accept=".dat,.raw,.bin">
        <span class="file-info">(Expected: .dat / [W, H, D] + Uint16 raw voxels)</span>
    </p>
    
    <select id="renderMode">
        <option value="MIP">MIP (Maximum Intensity)</option>
        <option value="ISO">ISO (First-Hit Compositing)</option>
    </select>

    <div class="container">

        
        <div id="viewContainer"></div>

        
        <div id="tfContainer">
            <svg id="histogram"></svg>
        </div>

        <div id="ballPopulation">
            <button id="addBall">+</button>
            <button id="removeBall">-</button>
        </div>


    </div>

    



</body>


</html>
